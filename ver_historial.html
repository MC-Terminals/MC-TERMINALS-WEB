<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historial de Ediciones | MC Terminals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
  <style>
    body {
      background-color: #082537;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }

    .card {
      background-color: #063552;
      border-radius: 15px;
      box-shadow: 0 0 20px #000000;
      padding: 20px;
      margin-top: 30px;
      position: relative;
    }

    .logo {
      position: absolute;
      top: 20px;
      right: 40px;
      width: 100px;
    }

    th, td {
      border: 1px solid #746c6c;
      padding: 8px;
      text-align: center;
    }

    
    th {
      background-color: transparent;
      color: #ffffff;
      font-weight: bold;
    }

    label {
      color: white;
      font-weight: bold;
      margin-right: 10px;
    }

     .btn-outline-dark{
      color: white;
      font-weight: bold;
      margin-right: 10px;
    }

    .filters {
      display: flex;
      gap: 15px;
      flex-wrap: wrap;
      margin-bottom: 15px;
      align-items: center;
    }

    input[type="text"], input[type="date"] {
      background-color: #000000;
      color: white;
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
    }

    .table-responsive { margin-top: 20px; }

    h3.text-center {
      color: #ffffff;
      margin-bottom: 20px;
      font-weight: bold;
      text-shadow: 0 0 5px #3f3f91;
    }

    #mensaje { font-size: 1rem; color: lightgreen; }

    /* ===== Calendarios blancos cross-browser ===== */
    .date-wrap{ position: relative; display: inline-block; }
    .date-wrap input[type="date"]{
      padding-right: 36px;      /* espacio para el icono */
      color-scheme: dark;       /* Firefox: controles claros */
    }
    /* Oculta el icono nativo (WebKit) pero mantiene funcionalidad */
    .date-wrap input[type="date"]::-webkit-calendar-picker-indicator{
      opacity: 0;
    }
    /* Botón con icono blanco superpuesto */
    .date-wrap .date-btn{
      position: absolute;
      top: 50%; right: 8px;
      transform: translateY(-50%);
      width: 22px; height: 22px;
      border: 0; background: transparent; padding: 0;
      cursor: pointer;
    }
    .date-wrap .date-btn::before{
      content: "";
      display: block; width: 100%; height: 100%;
      background: no-repeat center / contain
        url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="white"><path d="M7 2h2v2h6V2h2v2h3a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h3V2zm14 8H3v10h18V10zm-2-6h-3v2H8V4H5v2h14V4z"/></svg>');
      opacity: .95;
      filter: drop-shadow(0 1px 2px rgba(0,0,0,.25));
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <img src="https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos/Logo-MC-Terminals.png" alt="Logo MC Terminals" class="logo" />
      <h3 class="text-center">Historial de Ediciones</h3>

      <div class="filters">
        <label for="buscarOrden">Buscar por No. de Orden</label>
        <input type="text" id="buscarOrden" placeholder="Ej. 123...">

        <label for="fechaInicio">Fecha Inicio</label>
        <span class="date-wrap">
          <input type="date" id="fechaInicio">
          <button type="button" class="date-btn" aria-label="Abrir calendario"></button>
        </span>

        <label for="fechaFin">Fecha Fin</label>
        <span class="date-wrap">
          <input type="date" id="fechaFin">
          <button type="button" class="date-btn" aria-label="Abrir calendario"></button>
        </span>
      </div>

      <div class="table-responsive">
        <table class="table table-dark table-striped table-hover align-middle">
          <thead>
            <tr>
              <th>No. Orden</th>
              <th>Campo</th>
              <th>Valor Anterior</th>
              <th>Valor Nuevo</th>
              <th>Modificado por</th>
              <th>Fecha</th>
            </tr>
          </thead>
          <tbody id="historial-body">
            <!-- Datos dinámicos -->
          </tbody>
        </table>
      </div>

      <div class="text-center mt-4">
        <button class="btn btn-outline-dark" onclick="window.location.href='menu.html'">Regresar al Menú</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script>
  const supabase = window.__supabaseClient;


    const historialBody = document.getElementById("historial-body");
    const inputOrden = document.getElementById("buscarOrden");
    const inputInicio = document.getElementById("fechaInicio");
    const inputFin = document.getElementById("fechaFin");

    const fechaGuatemalaHoy = () =>
      new Date().toLocaleDateString('en-CA', { timeZone: 'America/Guatemala' });

    function formatearFechaGuatemala(fechaUTC) {
      const fecha = new Date(fechaUTC);
      return fecha.toLocaleString("es-GT", {
        timeZone: "America/Guatemala",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });
    }

    const cargarHistorial = async () => {
      const ordenFiltro = inputOrden.value.trim();
      const fechaInicio = inputInicio.value;
      const fechaFin = inputFin.value;

      let query = supabase.from("historial_ordenes").select("*");

      if (fechaInicio && fechaFin) {
        const inicio = new Date(`${fechaInicio}T00:00:00`);
        const fin = new Date(`${fechaFin}T23:59:59`);
        const inicioUTC = new Date(inicio.toLocaleString("en-US", { timeZone: "UTC" }));
        const finUTC = new Date(fin.toLocaleString("en-US", { timeZone: "UTC" }));
        query = query.gte("fecha_modificacion", inicioUTC.toISOString())
                     .lte("fecha_modificacion", finUTC.toISOString());
      }

      if (ordenFiltro !== "") {
        const ordenInt = parseInt(ordenFiltro);
        if (!isNaN(ordenInt)) query = query.eq("no_orden", ordenInt);
      }

      query = query.order("fecha_modificacion", { ascending: false });

      const { data: historial, error } = await query;
      historialBody.innerHTML = "";

      if (error) {
        console.error("Error al obtener historial:", error);
        historialBody.innerHTML = `<tr><td colspan='6' class='text-danger text-center'>Error al cargar historial.</td></tr>`;
        return;
      }

      if (!historial || historial.length === 0) {
        historialBody.innerHTML = `<tr><td colspan='6' class='text-warning text-center'>No hay resultados.</td></tr>`;
        return;
      }

      historial.forEach(entry => {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${entry.no_orden}</td>
          <td>${entry.campo || ""}</td>
          <td>${entry.valor_anterior || ""}</td>
          <td>${entry.valor_nuevo || ""}</td>
          <td>${entry.nit_usuario || ""}</td>
          <td>${formatearFechaGuatemala(entry.fecha_modificacion)}</td>
        `;
        historialBody.appendChild(row);
      });
    };

    document.addEventListener("DOMContentLoaded", () => {
      const hoy = fechaGuatemalaHoy();
      inputInicio.value = hoy;
      inputFin.value = hoy;

      inputOrden.addEventListener("input", cargarHistorial);
      inputInicio.addEventListener("change", cargarHistorial);
      inputFin.addEventListener("change", cargarHistorial);

      cargarHistorial();
    });

    /* Abrir el selector al pulsar el icono blanco */
    document.querySelectorAll('.date-wrap .date-btn').forEach(btn=>{
      btn.addEventListener('click', ()=>{
        const input = btn.previousElementSibling;
        if (input && typeof input.showPicker === 'function') {
          input.showPicker();     // Chrome/Edge
        } else {
          input.focus();          // Firefox abre calendario al enfocar/clicar
          input.click?.();
        }
      });
    });
  </script>

  <script src="guard_bloqueo.js"></script>
  <script src="mensajes_globales.js"></script>
</body>
</html>
