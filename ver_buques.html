<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lista de Buques | MC Terminals</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
    body {
      background-color: #082537;
      color: white;
      font-family: 'Segoe UI', sans-serif;
    }
    .logo-header {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      padding: 20px 50px;
    }
    .logo-header img {
      height: 70px;
    }
    .container {
      margin-top: 10px;
    }
    .card {
      background-color: #063552;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.4);
    }
    .form-control {
      background-color: #2c2c4a;
      border: 1px solid #555;
      color: white;
    }
    .form-control::placeholder {
      color: #ccc;
    }
    .btn {
      font-weight: bold;
    }
    .table {
      color: white;
    }
    @media (max-width: 768px) {
      .logo-superior {
      position: absolute;
      top: 25px;
      right: 10px;
    }
      .logo-header img {
        height: 80px;
      }
      .filtro-flex {
        flex-direction: column !important;
        gap: 10px;
      }
      .form-control.w-50 {
        width: 100% !important;
      }
    }
  </style>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>

  
  <div class="logo-header">
    <img src="https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos/Logo-MC-Terminals.png" alt="MC Terminals">
  </div>

  <div class="container">
    <h2 class="text-center mb-3">Lista de Buques</h2>

    <div class="d-flex justify-content-between align-items-center mb-3 filtro-flex">
      <button class="btn btn-success" onclick="window.location.href='agregar_buque.html'">➕ Agregar Buque</button>
      <input type="text" id="filtroNombre" class="form-control w-50" placeholder="🔍 Filtrar por nombre de buque..." />
    </div>

    <div id="tablaBuques" class="card">
      <table class="table table-dark table-bordered table-striped">
        <thead>
          <tr>
            <th>Nombre</th>
            <th>Fecha</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tbodyBuques"></tbody>
      </table>
    </div>

  <!-- ✅ Botón para volver al menú principal -->
    <div class="d-grid gap-2 mt-3">
      <button class="btn btn-outline-light" onclick="window.location.href='menu.html'">⬅ Menú Principal</button>
    </div>

  </div> <!-- cierre de container -->




  <script>
    // Seguridad: sesión obligatoria
    if (!localStorage.getItem("nit")) {
      window.location.replace("login.html");
    }

    // Bloqueo de retroceso
    history.pushState(null, null, location.href);
    window.onpopstate = function () {
      history.pushState(null, null, location.href);
    };
  </script>
<!-- 1️⃣ Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabaseClient.js"></script>

<!-- 2️⃣ Script de la página -->
<script src="script_ver_buques.js"></script>

<!-- 3️⃣ Guardia de sesión (SIEMPRE AL FINAL) -->
<script src="guard_bloqueo.js"></script>


</body>

</html>
