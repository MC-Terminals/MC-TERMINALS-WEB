<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Cambiar Estatus | MC Terminals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color:#082537; color:white; font-family:'Segoe UI',sans-serif; }
    .contenedor-ajustado { max-width:95%; margin:0 auto; }
    .card {
      position:relative;
      background-color:#063552;
      border-radius:15px;
      box-shadow:0 0 20px #000;
      margin-top:30px;
      padding:20px;
    }
    .logo-superior { position:absolute; top:20px; right:50px; }
    .logo-img { width:100px; height:auto; }
    .form-label { color:#ffffff; font-weight:bold; }
    .form-control,
    .form-select {
      background-color:#ffffff;
      color:#000;
      border:none;
      border-radius:8px;
      margin-bottom:10px;
    }
    .form-control::placeholder { color:#000; }

    .table {
      color:white;
      background-color:#2c2c4a;
      border-collapse:separate !important;
      border-spacing:0;
    }
    .table thead th {
      position:sticky;
      top:0;
      z-index:2;
      background-color:#343a40 !important;
      color:white !important;
      text-align:center;
    }
    .table th,
    .table td {
      vertical-align:middle;
      border:1px solid rgba(95,88,88,.356) !important;
      text-align:center;
    }
    .table th:nth-child(12),
    .table td:nth-child(12) {
      min-width:160px;
      word-break:break-word;
    }
    .table th:nth-child(13),
    .table td:nth-child(13) {
      min-width:140px;
      word-break:break-word;
    }

    .table-responsive {
      overflow-x:auto;
      max-height:500px;
      margin-top:20px;
    }

    .btn-cambiar { color:white; background-color:#007bff; }
    .btn-cambiar:hover { background-color:#0056b3; }

    .bodega-externa td { background-color:#ffe5e5 !important; }

    .btn {
      border-radius:8px;
      padding:6px 12px;
      font-weight:500;
    }

    /* 🔹 Botones de paginación */
    .botones-paginacion button {
      border-radius:20px;
      border:1px solid #ffffff;
      background-color:transparent;
      color:#ffffff;
      padding:5px 15px;
      margin-left:5px;
      margin-right:5px;
    }

    .botones-paginacion button:disabled {
      opacity:0.5;
      cursor:not-allowed;
    }

    @media (max-width:768px){
      .logo-superior{ top:25px; right:10px; }
      .logo-img{ width:80px; }
      h2.text-white{ font-size:1.4rem; text-align:center; }
      .row .col-md-3{ width:100%; }
      .form-label{ font-size:.9rem; }
      .btn{ width:100%; }
      .card{ margin:15px; padding:15px; }

      .botones-paginacion {
        width:100%;
        display:flex;
        justify-content:center;
        gap:10px;
        margin-top:10px;
      }
    }
  </style>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>
<div class="container-fluid contenedor-ajustado">
  <div class="card p-4">
    <h2 class="text-center mb-4 text-white">Cambiar Estatus de Orden</h2>
    <div class="logo-superior">
      <img src="https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos/Logo-MC-Terminals.png" alt="Logo MC" class="logo-img">
    </div>

    <!-- 🔹 FILTROS -->
    <div class="row g-3 mb-3">
      <div class="col-md-3">
        <label class="form-label" for="filtroEstatus">Estatus</label>
        <select id="filtroEstatus" name="filtroEstatus" class="form-select">
          <option value="">Todos</option>
          <option value="generada">Generada</option>
          <option value="registrada">Registrada</option>
          <option value="salio_predio">Salió de predio</option>
          <option value="peso_inicial">Peso Inicial</option>
        </select>
      </div>

      <div class="col-md-3">
        <label class="form-label" for="filtroFechaInicio">Fecha Inicio</label>
        <input type="date" id="filtroFechaInicio" name="filtroFechaInicio" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label" for="filtroFechaFin">Fecha Fin</label>
        <input type="date" id="filtroFechaFin" name="filtroFechaFin" class="form-control">
      </div>

      <div class="col-md-3">
        <label class="form-label" for="filtroBodega">Bodega</label>
        <select id="filtroBodega" name="filtroBodega" class="form-select">
          <option value="">Todas</option>
          <option value="MC Terminals Puerto Barrios">Puerto Barrios</option>
          <option value="MC Terminals Puerto Quetzal">Puerto Quetzal</option>
        </select>
      </div>

      <div class="col-md-3">
        <label class="form-label" for="filtroProducto">Producto</label>
        <select id="filtroProducto" name="filtroProducto" class="form-select">
          <option value="">Todos</option>
          <!-- opciones dinámicas -->
        </select>
      </div>

      <div class="col-md-3">
        <label class="form-label" for="filtroPlaca">Placa</label>
        <input type="text" id="filtroPlaca" name="filtroPlaca" class="form-control" placeholder="Ingrese placa">
      </div>

      <div class="col-md-3">
        <label class="form-label" for="filtroPiloto">Piloto</label>
        <input type="text" id="filtroPiloto" name="filtroPiloto" class="form-control" placeholder="Ingrese piloto">
      </div>

      <div class="col-md-3">
        <label class="form-label" for="filtroEmpresa">Empresa</label>
        <select id="filtroEmpresa" name="filtroEmpresa" class="form-select">
          <option value="">Todas</option>
          <!-- opciones dinámicas -->
        </select>
      </div>
    </div>

    <!-- 🔹 TABLA -->
    <div class="table-responsive">
      <table class="table table-bordered table-hover" id="tablaOrdenes">
        <thead>
          <tr>
            <th>No. Orden</th>
            <th>Fecha</th>
            <th>Empresa</th>
            <th>Buque</th>
            <th>Poliza</th>
            <th>Piloto</th>
            <th>Placa</th>
            <th>Producto</th>
            <th>Bodega</th>
            <th>Cant. (qq)</th>
            <th>Cant. (ton)</th>
            <th>Nombre Transporte</th>
            <th>No. Orden Interna</th>
            <th>Observación</th>
            <th>Estatus</th>
            <th>Turno</th>
            <th>Acciones</th>
            <th>Bodega Ext.</th>
          </tr>
        </thead>
        <tbody id="cuerpoTabla"></tbody>
      </table>
    </div>

    <!-- 🔹 PAGINACIÓN (conecta con script_cambiar_estatus.js) -->
    <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap">
      <div id="contadorOrdenes" class="fw-bold text-white mb-2 mb-md-0"></div>
      <div class="botones-paginacion">
        <button id="btnAnterior">Anterior</button>
        <button id="btnSiguiente">Siguiente</button>
      </div>
    </div>

    <div class="text-center mt-3">
      <button class="btn btn-outline-light" onclick="window.location.href='menu.html'">Regresar al Menú</button>
    </div>
  </div>
</div>





<script>
  if (!localStorage.getItem("nit")) { window.location.replace("login.html"); }
  history.pushState(null, null, location.href);
  window.onpopstate = function () { history.pushState(null, null, location.href); };
</script>
<!-- 1️⃣ Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2️⃣ Cliente único -->
<script src="supabaseClient.js"></script>

<!-- 3️⃣ Guard -->
<script src="guard_bloqueo.js"></script>

<!-- 4️⃣ Lógica de la página -->
<script src="script_cambiar_estatus.js"></script>


</body>
</html>
