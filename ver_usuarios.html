<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gestión de Usuarios | MC Terminals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body{background:#082537;color:#fff;font-family:'Segoe UI',sans-serif}
    .card{position:relative;background:#063552;border:none;border-radius:20px;box-shadow:0 0 20px #000000;padding:20px}
    .btn-action{font-size:.9rem;margin:2px}
    .form-control,.form-select{background:#2c2c4a;color:#fff;border:none}
    .form-control::placeholder{color:#bbb}
    .form-label{color:#fff}
    .table{color:#fff}
    .logo-superior{text-align:end;margin-bottom:10px}
    .logo-img{width:150px;height:auto}
    .badge-bloqueado{background:#ef4444} /* rojo */
    @media (max-width:768px){
      .logo-superior{position:absolute;top:20px;right:10px}
      .logo-img{width:60px}
      h2.text-white{text-align:center;font-size:1.4rem}
      .row.mb-3 .col-md-6{margin-bottom:15px}
      .btn-action{display:block;width:100%;margin:3px 0}
    }
    /* en <style> o CSS externo */
.usuarios-toolbar {
  margin-top: 20px;
  text-align: right;
}

  </style>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>
<div class="container mt-4">
  <div class="card">
    <div class="logo-superior">
      <img src="https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos/Logo-MC-Terminals.png" class="logo-img" alt="Logo MC">
    </div>
    <h2 class="text-white">Gestión de Usuarios</h2>

    <div class="row mb-3">
      <div class="col-md-6">
        <label class="form-label">Buscar por NIT:</label>
        <input type="text" id="filtroNIT" class="form-control" placeholder="Ingrese NIT">
      </div>
      <div class="col-md-6">
        <label class="form-label">Buscar por Empresa:</label>
        <input type="text" id="filtroEmpresa" class="form-control" placeholder="Ingrese Empresa">
      </div>
    </div>

    <div class="table-responsive">
      <table class="table table-bordered table-hover">
        <thead>
          <tr>
            <th>NIT</th>
            <th>Empresa</th>
            <th>Rol</th>
            <th>Email</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaUsuarios"></tbody>
      </table>
    </div>
    <!-- HTML -->
<div class="usuarios-toolbar">...</div>

  </div>
</div>

<!-- Modal: Cambiar rol -->
<div class="modal fade" id="modalRol" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content text-dark">
      <div class="modal-header">
        <h5 class="modal-title">Asignar nuevo rol</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        <select id="nuevoRol" class="form-select">
          <option value="">Seleccione un rol</option>
          <option value="admin">admin</option>
          <option value="bascula">bascula</option>
          <option value="cheque">cheque</option>
          <option value="consignatario">consignatario</option>
          <option value="operador_externo">operador_externo</option>
        </select>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-primary" id="confirmarRol">Asignar</button>
      </div>
    </div>
  </div>
</div>

<div class="text-center mt-4">
  <button class="btn btn-outline-light" onclick="window.location.href='menu.html'">Regresar al Menú</button>
</div>


<!-- 1️⃣ Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<!-- 2️⃣ Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 3️⃣ Cliente global -->
<script src="supabaseClient.js"></script>

<!-- 4️⃣ Bloqueo de sesión -->
<script src="guard_bloqueo.js"></script>

<!-- 5️⃣ Script de usuarios -->
<script src="ver_usuarios.js"></script>




</body>
</html>
