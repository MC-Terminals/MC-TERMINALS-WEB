<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Crear Orden | MC Terminals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color:#082537; color:#fff; font-family:'Segoe UI',sans-serif; }
    .card { position:relative; background-color:#063552; border-radius:15px; box-shadow:0 0 20px #000; margin-top:50px; padding:20px; }
    .form-label{ color:#fff; font-weight:bold; }
    input, select, textarea{ background-color:#2c2c4a; color:#fff; border:none; }
    input::placeholder, textarea::placeholder{ color:#aaa; }
    .logo-superior{ position:absolute; top:20px; right:50px; }
    .logo-img{ width:100px; height:auto; }
    .ayuda-placa{ color:#fff; }
    @media (max-width:768px){
      .logo-superior{ top:10px; right:10px; }
      .logo-img{ width:80px; }
      h3.text-white{ font-size:1.3rem; text-align:center; }
      .row .col-md-6{ width:100%; }
      .form-label{ font-size:.9rem; }
      .btn{ width:100%; }
    }
  </style>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>
  <div class="container">
    <div class="card p-4">
      <div class="logo-superior">
        <img src="https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos/Logo-MC-Terminals.png" alt="Logo MC" class="logo-img">
      </div>
      <h3 class="text-center mb-4 text-white">Crear Nueva Orden</h3>

      <form id="ordenForm" novalidate>
        <div class="mb-3">
          <label class="form-label" for="fecha_programada">Fecha de carga (opcional)</label>
          <input type="date" class="form-control" id="fecha_programada" name="fecha_programada">
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label" for="bodega">Bodega</label>
            <select class="form-select" id="bodega" name="bodega" required>
              <option value="">Seleccione...</option>
              <option value="MC Terminals Puerto Barrios">Puerto Barrios</option>
              <option value="MC Terminals Puerto Quetzal">Puerto Quetzal</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="buque">Nombre del Buque</label>
            <select class="form-select" id="buque" name="buque" required>
              <option value="">Seleccione un buque...</option>
            </select>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label" for="bl">Poliza</label>
            <select class="form-select" id="bl" name="bl" required>
              <option value="">Seleccione una poliza...</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="producto">Producto</label>
            <select class="form-select" id="producto" name="producto" required>
              <option value="">Seleccione un producto...</option>
            </select>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label" for="piloto">Piloto</label>
            <input type="text" class="form-control" id="piloto" name="piloto" required>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="placa">Placa</label>
            <div class="input-group">
              <span class="input-group-text">C-</span>
              <input type="text" class="form-control" id="placa" name="placa"
                     placeholder="123ABC" maxlength="6" autocomplete="off"
                     aria-describedby="ayudaPlaca" required>
            </div>
            <small id="ayudaPlaca" class="ayuda-placa">Ingrese 3 números y 3 letras. Ejemplo: 123ABC (el sistema agrega C-).</small>
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label" for="tipo_unidad">Tipo de Unidad</label>
            <select class="form-select" id="tipo_unidad" name="tipo_unidad" required>
              <option value="">Seleccione...</option>
              <option value="varanda">Varanda</option>
              <option value="granelera">Granelera</option>
              <option value="gondola">Góndola</option>
              <option value="volteo">Volteo</option>
            </select>
          </div>
          <div class="col-md-6">
            <label class="form-label" for="cantidad_qq">Cantidad (qq)</label>
            <input type="number" class="form-control" id="cantidad_qq" name="cantidad_qq"
                   required min="1" step="0.0001" inputmode="decimal">
          </div>
        </div>

        <div class="row mb-3">
          <div class="col-md-6">
            <label class="form-label" for="nombre_transporte">Nombre del Transporte</label>
            <input type="text" class="form-control" id="nombre_transporte" name="nombre_transporte" placeholder="Ej. TRANSPORTE A GRANEL">
          </div>
          <div class="col-md-6">
            <label class="form-label" for="orden_interna">No. de Orden Interna</label>
            <input type="text" class="form-control" id="orden_interna" name="orden_interna" placeholder="Ej. ORD-2024-AZ55">
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label" for="observacion">Observación</label>
          <textarea class="form-control" id="observacion" name="observacion" rows="2"></textarea>
        </div>

        <button type="submit" class="btn btn-success w-100">Crear Orden</button>
        <div id="mensaje" class="text-center mt-3 text-white" role="alert"></div>
        <button type="button" class="btn btn-primary w-100 mt-2" onclick="window.location.href='ingreso_masivo.html'">Ingreso Masivo</button>
      </form>
    </div>
  </div>

  <div class="text-center mt-4">
    <button class="btn btn-outline-light" onclick="window.location.href='menu.html'">Regresar al Menú</button>
  </div>

  <!-- 1️⃣ Librería Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2️⃣ Cliente global (SOLO UNO EN TODO EL PROYECTO) -->
<script src="supabaseClient.js"></script>

<!-- 3️⃣ Bloqueo por usuario -->
<script src="guard_bloqueo.js"></script>

<!-- 4️⃣ Script de esta página -->
<script src="script_crear_orden.js"></script>

 
</body>
</html>
