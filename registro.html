<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Registro de Usuario | MC Terminals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background: url('https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos//fondo_registro.jpeg') no-repeat center center fixed;
      background-size: cover;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background-color: #00416ab0; /* Fondo oscuro semitransparente */
      border-radius: 15px;
      color: white;
      font-weight: bold;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
    }
    .logo {
      display: block;
      margin: 0 auto 15px;
      height: 90px;
    }
    /* ⬇️ reemplaza el inline style del contenedor */
    .card-narrow { max-width: 500px; }
  </style>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
</head>

<body>
  <div class="container mt-5">
    <div class="card mx-auto shadow card-narrow">
      <div class="card-body">
        <img src="https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos/Logo-MC-Terminals.png" alt="Logo MC" class="logo">
        <h3 class="card-title text-center mb-4">Crear Nuevo Usuario</h3>

        <form id="registroForm" novalidate>
          <div class="mb-3">
            <label for="nit" class="form-label">Número de NIT</label>
            <input type="text" class="form-control" id="nit" name="nit" autocomplete="username" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña (4 a 15 caracteres)</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password" name="password"
                     minlength="4" maxlength="15" autocomplete="new-password"
                     aria-describedby="helpPass" required>
              <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()" aria-label="Mostrar u ocultar contraseña">Ver</button>
            </div>
            <small id="helpPass" class="form-text">Usa de 4 a 15 caracteres.</small>
          </div>

          <div class="mb-3">
            <label for="cargo" class="form-label">Cargo</label>
            <input type="text" class="form-control" id="cargo" name="cargo" autocomplete="organization-title" required>
          </div>

          <div class="mb-3">
            <label for="empresa" class="form-label">Empresa</label>
            <input type="text" class="form-control" id="empresa" name="empresa" autocomplete="organization" required>
          </div>

          <div class="mb-3">
            <label for="email" class="form-label">Correo electrónico (importante)</label>
            <input type="email" class="form-control" id="email" name="email" placeholder="usuario@gmail.com" autocomplete="email">
          </div>

          <div class="mb-3">
            <label for="rol" class="form-label">Rol</label>
            <select class="form-select" id="rol" name="rol" required aria-label="Seleccionar rol"></select>
          </div>

          <button type="submit" class="btn btn-success w-100">Registrar</button>
          <a href="login.html" id="volverBtn" class="btn btn-link w-100 mt-2">Volver a Iniciar Sesión</a>
        </form>

        <div id="mensaje" class="text-danger text-center mt-3" role="alert"></div>
      </div>
    </div>
  </div>

  

<!-- 1️⃣ Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2️⃣ Cliente global (OBLIGATORIO) -->
<script src="supabaseClient.js"></script>

<!-- 3️⃣ Script de registro -->
<script src="script.js"></script>




</body>
</html>
