<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ver Órdenes | MC Terminals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    html, body {
      margin: 0; padding: 0; width: 100%; height: 100%;
      background-color: #082537; color: #fff; font-family: 'Segoe UI', sans-serif;
      overflow-x: hidden;
    }

    .container { width: 100%; padding: 0 15px; }

    .card {
      position: relative; background-color: #063552; border: none; border-radius: 20px;
      box-shadow: 0 0 20px #000; margin-top: 30px; padding: 20px; width: 100%;
      overflow-x: visible;
    }

    .form-label { color: #fff; }
    .form-control { color: #000; font-weight: bold; }
    .form-select { background-color: #fff; border: none; }
    .form-control::placeholder { color: #000; }

    .table-responsive {
      display: block; width: 100%; overflow-x: auto !important; border-radius: 10px;
    }
    /* Solo para iOS Safari */
    @supports (-webkit-overflow-scrolling: touch) {
      .table-responsive { -webkit-overflow-scrolling: touch; }
    }

    .table-responsive table { min-width: 1200px !important; }

    .table { color: #fff; font-size: 0.82rem; table-layout: auto; }
    .table th, .table td { white-space: nowrap; vertical-align: middle; text-align: center; padding: 0.4rem 0.5rem; }
    .table th { font-weight: 600; }

    .col-check { width: 28px; }  

    .logo-superior { position: absolute; top: 20px; right: 50px; }
    .logo-img { width: 100px; height: auto; }

    /* Responsive para móviles */
    @media (max-width: 768px) {
      .logo-img { width: 70px; }
      h2.text-white { text-align: center; font-size: 1.4rem; }
      .row.g-3 .col-md-3 { width: 100%; }
      .d-flex.gap-2 { flex-direction: column !important; }
      .btn { width: 100% !important; }
      .table { font-size: 0.7rem; }
      .table-responsive { overflow-x: auto !important; }
      .card { overflow-x: visible !important; }
      body { overflow-x: visible !important; }
    }

    /* Pantallas grandes */
    @media (min-width: 992px) {
      .container { max-width: 100% !important; padding: 0 30px; }
      .card { overflow-x: visible; }
    }

    #contadorOrdenes {
      font-size: 0.9rem; background-color: #000; padding: 6px 12px; border-radius: 8px; display: inline-block;
    }

    /* Botones de paginación */
    #btnAnterior, #btnSiguiente {
      background-color: #4a4a9e; color: white; border: none; padding: 8px 20px;
      border-radius: 10px; transition: background-color 0.3s ease; font-weight: bold; min-width: 100px;
    }
    #btnAnterior:hover, #btnSiguiente:hover { background-color: #6868c0; }
    #btnAnterior:disabled, #btnSiguiente:disabled { background-color: #888 !important; color: #ddd !important; cursor: not-allowed; }

    .botones-paginacion { display: flex; gap: 15px; justify-content: flex-end; flex-wrap: wrap; }
    @media (max-width: 768px) { .botones-paginacion { justify-content: center; margin-top: 10px; } }

    /* Viewport scroll + tabla */
    #ordersViewport { overflow: auto; touch-action: pan-x pan-y; }
    #miTabla {
      --tzoom: 1;
      font-size: calc(0.82rem * var(--tzoom));
      min-width: 1200px;
    }
    #miTabla th, #miTabla td { padding: calc(0.45rem * var(--tzoom)) calc(0.55rem * var(--tzoom)); white-space: nowrap; }
    #miTabla thead th { font-size: calc(0.86rem * var(--tzoom)); font-weight: 600; }

    #zoomPct { color: orange; font-weight: bold; }
    .zoom-range { width: 140px; } 
  </style>

  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>
  <div class="container">
    <div class="card p-4">
      <h2 class="text-center text-white mb-4">Ver Órdenes de Carga</h2>

      <div class="logo-superior">
        <img src="https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos/Logo-MC-Terminals.png" alt="Logo MC" class="logo-img">
      </div>

      <div class="row g-3 mb-3">
        <div class="col-md-3">
          <label class="form-label" for="filtroEstatus">Estatus</label>
          <select id="filtroEstatus" name="filtroEstatus" class="form-select">
            <option value="">Todos</option>
            <option value="generada">Generada</option>
            <option value="registrada">Registrada</option>
            <option value="salio_predio">Salió de predio</option>
            <option value="peso_inicial">Peso Inicial</option>
            <option value="finalizada">Finalizada</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label" for="filtroFechaInicio">Fecha Inicio</label>
          <input type="date" id="filtroFechaInicio" name="filtroFechaInicio" class="form-control">
        </div>

        <div class="col-md-3">
          <label class="form-label" for="filtroFechaFin">Fecha Fin</label>
          <input type="date" id="filtroFechaFin" name="filtroFechaFin" class="form-control">
        </div>

        <div class="col-md-3">
          <label class="form-label" for="filtroBodega">Bodega</label>
          <select id="filtroBodega" name="filtroBodega" class="form-select">
            <option value="">Todas</option>
            <option value="MC Terminals Puerto Barrios">MC Terminals Puerto Barrios</option>
            <option value="MC Terminals Puerto Quetzal">MC Terminals Puerto Quetzal</option>
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label" for="filtroProducto">Producto</label>
          <select id="filtroProducto" name="filtroProducto" class="form-select">
            <option value="">Todos</option>
            <!-- Opciones dinámicas -->
          </select>
        </div>

        <div class="col-md-3">
          <label class="form-label" for="filtroPlaca">Placa</label>
          <input type="text" id="filtroPlaca" name="filtroPlaca" class="form-control" placeholder="Ingrese placa">
        </div>

        <div class="col-md-3">
          <label class="form-label" for="filtroPiloto">Piloto</label>
          <input type="text" id="filtroPiloto" name="filtroPiloto" class="form-control" placeholder="Ingrese nombre del piloto">
        </div>

        <div class="col-md-3">
          <label class="form-label" for="filtroBodegaExterna">Bodega Externa</label>
          <select id="filtroBodegaExterna" name="filtroBodegaExterna" class="form-select">
            <option value="">Todas</option>
            <option value="true">Sí</option>
            <option value="false">No</option>
          </select>
        </div>

        <div class="col-md-3 d-flex align-items-end gap-2">
          <button class="btn btn-success w-50" onclick="exportarExcel()">Exportar</button>
          <button class="btn btn-secondary w-50" onclick="limpiarFiltros()">Limpiar</button>
        </div>

        <div class="col-md-3">
          <label class="form-label" for="filtroEmpresa">Empresa</label>
          <select id="filtroEmpresa" name="filtroEmpresa" class="form-select">
            <option value="">Todas</option>
          </select>
        </div>
      </div>

      <div class="d-flex align-items-center gap-2 mb-2 flex-wrap">
        <button id="btnImprimirMasivo" class="btn btn-primary" disabled>Imprimir Orden Masiva</button>
        <span id="selInfo" class="ms-2 text-white-50"></span>
      </div>

      <!-- Controles de zoom -->
      <div class="zoom-controls d-flex align-items-center gap-2 mb-2">
        <button id="zoomOut" class="btn btn-sm btn-outline-light">−</button>
        <label for="zoomRange" class="visually-hidden">Zoom de tabla</label>

        <input id="zoomRange" type="range" min="0.7" max="1.4" step="0.01" value="1" class="zoom-range">
        <button id="zoomIn" class="btn btn-sm btn-outline-light">+</button>
        <button id="zoomReset" class="btn btn-sm btn-outline-light">100%</button>
        <small class="ms-2"><span id="zoomPct">100%</span></small>
      </div>

      <div id="ordersViewport" class="table-responsive">
        <table class="table table-bordered table-hover" id="miTabla">
          <thead>
            <tr>
              <th class="col-check">
  <input type="checkbox" id="checkAllPage" name="checkAllPage" class="form-check-input" aria-label="Seleccionar todas las filas de esta página">
  <!-- O con label oculto: -->
  <!-- <label for="checkAllPage" class="visually-hidden">Seleccionar todas las filas de esta página</label> -->
</th>
              <th>No. Orden</th>
              <th>Fecha</th>
              <th>Buque</th>
              <th>Poliza</th>
              <th>Empresa</th>
              <th>Placa</th>
              <th>Piloto</th>
              <th>Producto</th>
              <th>Bodega</th>
              <th>Cant. (qq)</th>
              <th>Cant. (ton)</th>
              <th>Nombre Transporte</th>
              <th>No. Orden Interna</th>
              <th>Observación</th>
              <th>Estatus</th>
              <th>Bodega Externa</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="tablaOrdenes"></tbody>
        </table>
      </div>

      <div class="d-flex justify-content-between align-items-center mt-3 flex-wrap">
        <div id="contadorOrdenes" class="fw-bold text-white mb-2 mb-md-0"></div>
        <div class="botones-paginacion">
          <button id="btnAnterior">Anterior</button>
          <button id="btnSiguiente">Siguiente</button>
        </div>
      </div>
    </div>
  </div>

  <div class="text-center mt-4">
    <button class="btn btn-outline-light" onclick="window.location.href='menu.html'">Regresar al Menú</button>
  </div>






  <script>
    // Seguridad: sesión obligatoria
    if (!localStorage.getItem("nit")) {
      window.location.replace("login.html");
    }
    // Bloqueo de retroceso
    history.pushState(null, null, location.href);
    window.onpopstate = function () { history.pushState(null, null, location.href); };
  </script>
<!-- 1️⃣ Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2️⃣ Cliente ÚNICO global -->
<script src="supabaseClient.js"></script>

<!-- 3️⃣ Guard de bloqueo -->
<script src="guard_bloqueo.js"></script>

<!-- 4️⃣ Script de la página -->
<script src="script_ver_ordenes.js"></script>


  
</body>
</html>
