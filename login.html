<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión | MC Terminals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body{
      background:url('https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos/fondo_login.jpeg') no-repeat center center fixed;
      background-size:cover;
      font-family:'Segoe UI',sans-serif;
      color:#fff;
    }
    .card{
      background-color:#00416ab0;
      border-radius:15px;
      box-shadow:0 4px 20px rgba(0,0,0,.5);
      padding:20px;
    }
    .card-narrow{ max-width:400px; }         /* ← reemplaza style inline */
    .logo-img{ display:block; margin:0 auto 10px; max-height:80px; }
    @media (max-width:576px){ .logo-img{ max-height:100px; } }

    .form-label, .card-title, .btn{ font-weight:700; color:#fff !important; }
    .form-control{
      background-color:rgba(255,255,255,.2);
      border:1px solid #fff; color:#fff !important; caret-color:#fff;
    }
    .form-control:focus{
      background-color:rgba(255,255,255,.3);
      outline:none; box-shadow:none; border-color:#87cefa;
    }
    .form-control::placeholder{ color:#ddd; }

    .btn-outline-secondary{ color:#fff; border-color:#fff; }
    .btn-outline-secondary:hover{ background-color:#fff; color:#000; }

    .link-olvide{ color:#9ecbff; text-decoration:underline; } /* ← reemplaza style inline */

     /* ===== MENSAJE GLOBAL ===== */
#modalMensajeGlobal .modal-content {
  background: #ffffff;
  color: #0e0e2c;
  border-radius: 16px;
}

#modalMensajeGlobal .modal-title {
  font-weight: 700;
  color: #0e0e2c;
}

#modalMensajeGlobal .mensaje-texto {
  font-size: 1rem;
  color: #1f2937;
  line-height: 1.6;
}

#modalMensajeGlobal .mensaje-archivo img {
  max-height: 60vh;
  object-fit: contain;
}

#modalMensajeGlobal iframe {
  width: 100%;
  height: 70vh;
  border: none;
}
  </style>
  <link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>
  <div class="container mt-5">
    <div class="card mx-auto shadow card-narrow">
      <div class="card-body">
        <img src="https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos/Logo-MC-Terminals.png"
             alt="Logo MC Terminals" class="logo-img">
        <h3 class="card-title text-center mb-4">Iniciar Sesión</h3>

        <form id="loginForm" novalidate>
          <div class="mb-3">
            <label for="nit" class="form-label">Número de NIT</label>
            <input type="text" class="form-control" id="nit" name="nit"
                   placeholder="Ej. 123456789" autocomplete="username" required>
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <div class="input-group">
              <input type="password" class="form-control" id="password" name="password"
                     placeholder="Contraseña" autocomplete="current-password"
                     aria-describedby="helpPass" required>
              <button type="button" class="btn btn-outline-secondary"
                      onclick="togglePassword()" aria-label="Mostrar u ocultar contraseña">Ver</button>
            </div>
            <small id="helpPass" class="form-text">Tu contraseña distingue mayúsculas y minúsculas.</small>
          </div>

          <button type="submit" class="btn btn-primary w-100">Iniciar Sesión</button>

          <div class="mt-2 text-center">
            <a href="olvide_password.html" class="link-olvide">¿Olvidó su contraseña?</a>
          </div>
        </form>

        <div id="mensaje" class="text-danger text-center mt-3" role="alert"></div>
      </div>
    </div>
  </div>

  <script>
    function togglePassword(){
      const el = document.getElementById('password');
      el.type = (el.type === 'password') ? 'text' : 'password';
    }
  </script>
<!-- Supabase SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Cliente global -->
<script src="supabaseClient.js"></script>

<!-- Tu lógica -->
<script src="script.js"></script>
<script src="mensajes_globales.js"></script>

  
</body>
</html>
