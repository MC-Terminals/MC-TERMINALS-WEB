<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Ingreso Masivo | MC Terminals</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

 <style>
  body {
    background-color: #082537;
    color: white;
    font-family: 'Segoe UI', sans-serif;
  }

  .card {
    background-color: #063552;
    border-radius: 15px;
    box-shadow: 0 0 20px #000000;
    margin-top: 50px;
    padding: 20px;
  }

  .form-label {
    font-weight: bold;
    color: white;
  }

  input, select {
    background-color: #2c2c4a;
    color: white;
    border: none;
  }

  .btn-outline-light {
    margin-top: 20px;
  }

  table {
    color: white;
  }

  th, td {
    font-size: 0.9rem;
  }

  .logo-superior {
    position: absolute;
    top: 20px;
    right: 50px;
  }

  .logo-img {
    width: 100px;
    height: auto;
  }
</style>
<link rel="shortcut icon" href="favicon.ico" type="image/x-icon" />
</head>
<body>
  <div class="container">
    <div class="card p-4 position-relative">
      <div class="logo-superior">
        <img src="https://fpqnzqrdyxmhptosplos.supabase.co/storage/v1/object/public/logos/Logo-MC-Terminals.png" alt="Logo MC" class="logo-img">
      </div>

      <h3 class="text-center mb-4 text-white">Ingreso Masivo de Órdenes</h3>

      <div class="row mb-3">
  <div class="col-md-4">
    <label class="form-label" for="fecha">Fecha de carga</label>
    <input type="date" class="form-control" id="fecha" name="fecha" aria-describedby="ayuda-fecha">
    <small id="ayuda-fecha" class="form-text text-muted">Selecciona la fecha de las órdenes.</small>
  </div>

  <div class="col-md-4">
    <label class="form-label" for="bodega">Bodega</label>
    <select class="form-select" id="bodega" name="bodega" required aria-label="Seleccionar bodega">
      <option value="" selected disabled>Seleccione...</option>
      <option value="MC Terminals Puerto Barrios">MC Terminals Puerto Barrios</option>
      <!-- más opciones -->
    </select>
  </div>

  <div class="col-md-4">
    <label class="form-label" for="buque">Buque</label>
    <select class="form-select" id="buque" name="buque" required aria-label="Seleccionar buque">
      <option value="" selected disabled>Seleccione...</option>
      <!-- opciones dinámicas -->
    </select>
  </div>
</div>

<div class="row mb-3">
  <div class="col-md-4">
    <label class="form-label" for="bl">BL</label>
    <select class="form-select" id="bl" name="bl" required aria-label="Seleccionar BL">
      <option value="" selected disabled>Seleccione...</option>
      <!-- opciones dinámicas -->
    </select>
  </div>

  <div class="col-md-4">
    <label class="form-label" for="producto">Producto</label>
    <select class="form-select" id="producto" name="producto" required aria-label="Seleccionar producto">
      <option value="" selected disabled>Seleccione...</option>
      <!-- opciones dinámicas -->
    </select>
  </div>

  <div class="col-md-4">
    <label class="form-label" for="tipo_unidad">Tipo de unidad</label>
    <select class="form-select" id="tipo_unidad" name="tipo_unidad" required aria-label="Seleccionar tipo de unidad">
      <option value="" selected disabled>Seleccione...</option>
      <option value="granelera">Granelera</option>
            <option value="gondola">Góndola</option>
            <option value="volteo">Volteo</option>
      <option value="camioneta">Baranda</option>
          </select>
        </div>
      </div>
    <div class="mb-3">
  <button class="btn btn-outline-light" onclick="descargarPlantilla()">📥 Descargar Plantilla Excel</button>
</div>

<div class="mb-3">
  <label class="form-label" for="excelInput">Archivo Excel a importar</label>
  <input
    type="file"
    class="form-control mt-2"
    id="excelInput"
    name="excelInput"
    accept=".xlsx,.xls"
    aria-describedby="ayuda-excel">
  <small id="ayuda-excel" class="form-text text-muted">Formatos permitidos: .xlsx, .xls</small>
</div>


      <div class="table-responsive mb-3">
        <table class="table table-bordered table-striped text-white" id="tablaPreview">
          <thead>
            <tr>
              <th>Piloto</th>
              <th>Placa</th>
              <th>Cantidad (qq)</th>
              <th>Nombre Transporte</th>
              <th>No. Orden Interna</th>
              <th>Observación</th>
              <th>Estado Placa</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>

      <div class="text-center">
        <button class="btn btn-success w-100" onclick="crearMasivas()">Crear Órdenes Masivas</button>
        <button class="btn btn-danger w-100 mt-2" onclick="limpiarFormulario()">🗑️ Limpiar Datos</button>
        <div id="mensaje" class="mt-2 text-white"></div>
      </div>
    </div>

    <div class="text-center mt-4">
      <button class="btn btn-outline-light" onclick="window.location.href='menu.html'">Regresar al Menú</button>
    </div>
  </div>

  
<!-- 1️⃣ Librería Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2️⃣ Cliente global (UNO SOLO) -->
<script src="supabaseClient.js"></script>

<!-- 3️⃣ Bloqueo de usuario -->
<script src="guard_bloqueo.js"></script>

<!-- 4️⃣ Script propio de ingreso masivo -->
<script src="script_ingreso_masivo.js"></script>



</body>
</html>
