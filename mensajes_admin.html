<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Admin | Mensajes Globales</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <style>
  :root {
    color-scheme: dark;
    --bg-main: #0e0e2c;
    --bg-card: #1b1b3a;
    --bg-input: #ffffff;
    --border-soft: #ffffff;
    --text-main: #000000;
    --text-muted: #ffffff;
    --accent: #6b7cff;
    --success: #22c55e;
    --warning: #facc15;
    --danger: #ef4444;
  }

  body {
    background: var(--bg-main);
    color: var(--text-main);
    font-family: 'Segoe UI', sans-serif;
  }

  .card {
    background: var(--bg-card);
    border-radius: 16px;
    max-width: 760px;
    margin: 6vh auto;
    padding: 24px;
    box-shadow: 0 0 25px rgba(107,124,255,.35);
  }

  /* ===== TITULOS ===== */
  h3 {
    color: #e5e7eb;
    font-weight: 600;
  }

  .heading-glow {
    text-shadow: 0 0 10px rgba(158,203,255,.45);
  }

  /* ===== INPUTS ===== */
  .form-control,
  .form-select,
  textarea {
    background: var(--bg-input);
    color: var(--text-main);
    border: 1px solid var(--border-soft);
  }

  .form-control::placeholder,
  textarea::placeholder {
    color: var(--text-muted);
  }

  .form-control:focus,
  textarea:focus {
    background: var(--bg-input);
    color: var(--text-main);
    border-color: var(--accent);
    box-shadow: 0 0 0 .2rem rgba(107,124,255,.25);
  }

  label,
  .form-label {
    color: #e5e7eb;
    font-weight: 500;
  }

  .muted,
  small {
    color: var(--text-muted);
  }

  /* ===== CHECK ===== */
  .form-check-input {
    background-color: var(--bg-input);
    border-color: #6a6a8a;
  }

  .form-check-input:checked {
    background-color: var(--success);
    border-color: var(--success);
  }

  /* ===== BOTONES ===== */
  .btn-success {
    background: var(--success);
    border: none;
    color: #052e16;
    font-weight: 600;
  }

  .btn-warning {
    background: var(--warning);
    color: #422006;
    border: none;
    font-weight: 600;
  }

  .btn-outline-light {
    border-color: #cbd5e1;
    color: #e5e7eb;
  }

  .btn-outline-light:hover {
    background: #e5e7eb;
    color: #1b1b3a;
  }

  /* ===== SALIDA JSON ===== */
  pre#salida {
    background: #020617;
    color: #e5e7eb;
    border-radius: 12px;
    padding: 14px;
    border: 1px solid #334155;
    font-size: .85rem;
    max-height: 260px;
    overflow: auto;
  }

  /* ===== LISTA DE MENSAJES ===== */
  #listaMensajes .mensaje-card {
    background: #020617;
    border: 1px solid #334155;
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 12px;
  }

  #listaMensajes h6 {
    color: #93c5fd;
    font-weight: 600;
  }

  #listaMensajes p {
    color: #e5e7eb;
    margin-bottom: 6px;
  }

  #listaMensajes .meta {
    font-size: .8rem;
    color: var(--text-muted);
  }

  #listaMensajes .btn-sm {
    font-size: .75rem;
  }
</style>

</head>
<body>
  <div class="card">
    <h3 class="mb-3 heading-glow">📢 Administrar mensajes globales</h3>

    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label" for="titulo">Título</label>
        <input id="titulo" name="titulo" class="form-control" maxlength="120" placeholder="Título corto" />
      </div>

      <div class="col-md-6">
        <label class="form-label" for="chkFijo">Tipo de mensaje</label>
        <div class="form-check">
          <input id="chkFijo" name="chkFijo" class="form-check-input" type="checkbox" checked />
          <label class="form-check-label" for="chkFijo">Fijo (sin caducidad)</label>
        </div>
      </div>

      <div class="col-12">
        <label class="form-label" for="mensajeTexto">Mensaje</label>
        <textarea id="mensajeTexto" name="mensajeTexto" rows="4" class="form-control" maxlength="2000" placeholder="Texto para todos los usuarios..."></textarea>
      </div>
      <div class="col-12">
  <label class="form-label">Archivo opcional (PDF o imagen)</label>
  <input type="file"
       id="archivo"
       class="form-control"
       accept="application/pdf,image/*"
       aria-label="Archivo opcional para mensaje global">
  <small class="muted">
    Puedes subir un PDF o una imagen en lugar del texto.
  </small>
</div>


      <div class="col-md-4">
        <label class="form-label" for="duracion">Duración (minutos, si NO es fijo)</label>
        <input id="duracion" name="duracion" type="number" class="form-control" value="30" min="1" max="1440" aria-describedby="ayudaDuracion"/>
        <div id="ayudaDuracion" class="muted mt-1">Solo se aplica si <b>no</b> marcas “Fijo”.</div>
      </div>

      <div class="col-12 d-grid gap-2 mt-2">
        <button type="button" class="btn btn-success" onclick="publicarMensaje()">Publicar</button>
      </div>
    </div>

    <hr class="my-4"/>

    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label" for="idCerrar">ID a cerrar (UUID)</label>
        <input id="idCerrar" name="idCerrar" type="text" class="form-control" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" />
      </div>
      <div class="col-md-6 d-grid gap-2 align-items-end">
        <button type="button" class="btn btn-warning" onclick="cerrarMensaje()">Cerrar mensaje</button>
        <button type="button" class="btn btn-outline-light" onclick="listarActivos()">Listar activos</button>
      </div>
    </div>

    <pre id="salida" class="mt-3"></pre>

    <div id="listaMensajes" class="mt-4"></div>

  </div>


<!-- 1️⃣ Librería oficial Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- 2️⃣ Inicializa el cliente -->
<script src="supabaseClient.js"></script>

<!-- 3️⃣ Lógica del admin -->
<script src="mensajes_admin.js"></script>

<!-- 4️⃣ Seguridad -->
<script src="guard_bloqueo.js"></script>


</body>
</html>
